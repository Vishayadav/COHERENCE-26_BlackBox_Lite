<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lead Input — OutreachFlow AI</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <link rel="stylesheet" href="styles.css">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { inter: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            50: '#eef4ff', 100: '#dae6ff', 200: '#bdd4ff',
                            300: '#90b8ff', 400: '#5c91ff', 500: '#3b6ef9',
                            600: '#2550ee', 700: '#1d3ddb', 800: '#1e34b1',
                            900: '#1e318c', 950: '#172055',
                        },
                        surface: {
                            50: '#f8f9fb', 100: '#f0f1f5', 200: '#e4e6ec',
                            300: '#d1d4de', 400: '#a8adc0', 500: '#8b91a7',
                            600: '#6e748f', 700: '#5c6178', 800: '#4d5164',
                            900: '#424555', 950: '#1a1c25',
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="font-inter bg-surface-950 text-white antialiased">

    <!-- Navigation -->
    <nav class="fixed top-0 left-0 right-0 z-50 nav-glass">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
                <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-brand-500 to-brand-700 flex items-center justify-center">
                    <i data-lucide="zap" class="w-4 h-4 text-white"></i>
                </div>
                <span class="text-lg font-semibold tracking-tight">OutreachFlow</span>
            </a>
            <!-- Stepper -->
            <div class="hidden sm:flex items-center gap-3">
                <div class="flex items-center gap-2 opacity-60">
                    <div class="w-7 h-7 rounded-full bg-emerald-600/20 border border-emerald-600/40 flex items-center justify-center">
                        <i data-lucide="check" class="w-3.5 h-3.5 text-emerald-400"></i>
                    </div>
                    <span class="text-sm font-medium text-surface-400">Setup</span>
                </div>
                <div class="w-8 h-px bg-surface-700"></div>
                <div class="flex items-center gap-2">
                    <div class="w-7 h-7 rounded-full bg-brand-600 flex items-center justify-center text-xs font-bold">2</div>
                    <span class="text-sm font-medium text-white">Leads</span>
                </div>
                <div class="w-8 h-px bg-surface-700"></div>
                <div class="flex items-center gap-2 opacity-40">
                    <div class="w-7 h-7 rounded-full bg-surface-800 flex items-center justify-center text-xs font-bold">3</div>
                    <span class="text-sm font-medium">Launch</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="pt-28 pb-20 min-h-screen">
        <div class="max-w-2xl mx-auto px-6 text-center">
            <!-- Campaign summary card -->
            <div id="campaign-summary" class="mb-10 p-6 rounded-2xl border border-surface-800/50 bg-surface-950/50 text-left">
                <div class="flex items-center gap-2 mb-4">
                    <div class="w-6 h-6 rounded-md bg-emerald-600/15 flex items-center justify-center">
                        <i data-lucide="check-circle" class="w-3.5 h-3.5 text-emerald-400"></i>
                    </div>
                    <h3 class="text-sm font-semibold uppercase tracking-wider text-surface-400">Campaign Configured</h3>
                </div>
                <div id="summary-details" class="grid grid-cols-2 gap-3 text-sm">
                    <!-- Filled by JS -->
                </div>
            </div>

            <div class="w-16 h-16 rounded-2xl bg-brand-600/10 border border-brand-600/20 flex items-center justify-center mx-auto mb-6">
                <i data-lucide="users" class="w-8 h-8 text-brand-400"></i>
            </div>
            <h1 class="text-3xl sm:text-4xl font-bold mb-3">Stage 2 — Lead Input</h1>
            <p class="text-surface-400 text-base max-w-md mx-auto mb-8">
                This stage is coming next. You'll be able to upload leads or let AI discover prospects for your campaign.
            </p>
            <div class="flex justify-center gap-4">
                <a href="setup.html" class="inline-flex items-center gap-2 px-6 py-2.5 rounded-xl border border-surface-700 hover:border-surface-500 text-surface-300 hover:text-white text-sm font-medium transition-all">
                    <i data-lucide="arrow-left" class="w-4 h-4"></i>
                    Edit Campaign
                </a>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        // Load and display campaign summary
        const saved = localStorage.getItem('campaign_context');
        if (saved) {
            try {
                const data = JSON.parse(saved);
                const summaryEl = document.getElementById('summary-details');
                const fields = [
                    { label: 'Industry', value: data.industry },
                    { label: 'Company', value: data.company_name },
                    { label: 'Target', value: data.target_customer },
                    { label: 'Geography', value: data.target_geography },
                    { label: 'Channel', value: data.outreach_channel },
                    { label: 'Goal', value: data.campaign_goal },
                ];
                summaryEl.innerHTML = fields.map(f => `
                    <div>
                        <span class="text-surface-500 text-xs">${f.label}</span>
                        <p class="text-white font-medium">${f.value || '—'}</p>
                    </div>
                `).join('');
            } catch (e) {
                console.warn('Could not parse campaign data');
            }
        } else {
            document.getElementById('campaign-summary').classList.add('hidden');
        }
    </script>
</body>
</html>
