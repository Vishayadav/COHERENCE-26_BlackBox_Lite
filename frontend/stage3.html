<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campaign Intent & AI Generation - OutreachFlow AI</title>
    <!-- Tailwind CSS (CDN) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <link rel="stylesheet" href="style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { inter: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: { 50: '#f0fdf4', 100: '#dcfce7', 200: '#bbf7d0', 300: '#86efac', 400: '#4ade80', 500: '#86efac', 600: '#16a34a', 700: '#15803d' },
                        surface: { 50: '#f9fafb', 100: '#f3f4f6', 200: '#e5e7eb', 300: '#d1d5db', 400: '#9ca3af', 500: '#6b7280', 600: '#4b5563', 700: '#374151', 800: '#1f2937', 900: '#111827', 950: '#030712' }
                    }
                }
            }
        }
    </script>
</head>
<body class="font-inter bg-surface-50 text-surface-900 antialiased overflow-x-hidden pt-28 pb-20">

    <!-- Navigation -->
    <nav class="fixed top-0 left-0 right-0 z-50 bg-white/90 backdrop-blur-md border-b border-surface-100">
        <div class="max-w-7xl mx-auto px-6 py-4 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2 hover:opacity-80 transition-opacity">
                <i data-lucide="zap" class="w-6 h-6 text-black fill-black"></i>
                <span class="text-xl font-bold tracking-tight text-black">OutreachFlow</span>
            </a>
            <!-- Stepper -->
            <div class="hidden sm:flex items-center gap-4">
                <div class="flex items-center gap-2">
                    <div class="w-7 h-7 rounded-full bg-brand-100 flex items-center justify-center text-brand-700">
                        <i data-lucide="check" class="w-4 h-4 text-brand-700 stroke-[3]"></i>
                    </div>
                    <span class="text-sm font-semibold text-black">Setup</span>
                </div>
                <div class="w-8 h-px bg-brand-300"></div>
                <div class="flex items-center gap-2">
                    <div class="w-7 h-7 rounded-full bg-brand-100 flex items-center justify-center text-brand-700">
                        <i data-lucide="check" class="w-4 h-4 text-brand-700 stroke-[3]"></i>
                    </div>
                    <span class="text-sm font-semibold text-black">Leads</span>
                </div>
                <div class="w-8 h-px bg-brand-300"></div>
                <div class="flex items-center gap-2">
                    <div class="w-7 h-7 rounded-full bg-brand-500 border-2 border-brand-500 flex items-center justify-center text-xs font-bold text-black shadow-sm">3</div>
                    <span class="text-sm font-semibold text-black">Launch</span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="max-w-4xl mx-auto px-6">
        <div class="mb-10 text-center sm:text-left">
            <h1 class="text-3xl sm:text-4xl font-extrabold tracking-tight text-black mb-3">AI Engine & Launch</h1>
            <p class="text-surface-600 text-base">Craft hyper-personalized outreach sequences with AI in seconds.</p>
        </div>

        <form id="intent-form" class="space-y-8" spellcheck="false">
            <!-- Campaign Intent Card -->
            <div class="bg-white p-8 rounded-2xl border border-surface-200 shadow-sm">
                <div class="flex items-center gap-2 mb-6 border-b border-surface-100 pb-3">
                    <i data-lucide="crosshair" class="w-5 h-5 text-black"></i>
                    <h2 class="text-base font-bold text-black">Campaign Intent</h2>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label for="campaign_name" class="block text-sm font-semibold text-black mb-2">Campaign Name</label>
                        <input type="text" id="campaign_name" class="form-input w-full" placeholder="e.g. AI SaaS Founder Outreach" required>
                    </div>
                    <div>
                        <label for="target_audience" class="block text-sm font-semibold text-black mb-2">Target Audience</label>
                        <input type="text" id="target_audience" class="form-input w-full" placeholder="e.g. Startup founders in SaaS" required>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-6">
                    <div>
                        <label for="campaign_goal" class="block text-sm font-semibold text-black mb-2">Goal of Outreach</label>
                        <select id="campaign_goal" class="form-input w-full" required>
                            <option value="Book a Demo">Book a Demo</option>
                            <option value="Schedule a Call">Schedule a Call</option>
                            <option value="Partnership">Partnership</option>
                            <option value="Sales Outreach">Sales Outreach</option>
                            <option value="Networking">Networking</option>
                            <option value="Custom">Custom</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-semibold text-black mb-2">Personalization Variables</label>
                        <div class="p-3 border border-surface-200 rounded-xl bg-surface-50 flex flex-wrap gap-2">
                            <label class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-white border border-surface-200 text-xs font-medium cursor-pointer hover:bg-surface-50 transition-colors">
                                <input type="checkbox" value="first_name" class="accent-brand-600 rounded" checked> {{first_name}}
                            </label>
                            <label class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-white border border-surface-200 text-xs font-medium cursor-pointer hover:bg-surface-50 transition-colors">
                                <input type="checkbox" value="company" class="accent-brand-600 rounded" checked> {{company}}
                            </label>
                            <label class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-white border border-surface-200 text-xs font-medium cursor-pointer hover:bg-surface-50 transition-colors">
                                <input type="checkbox" value="job_title" class="accent-brand-600 rounded"> {{job_title}}
                            </label>
                            <label class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-white border border-surface-200 text-xs font-medium cursor-pointer hover:bg-surface-50 transition-colors">
                                <input type="checkbox" value="industry" class="accent-brand-600 rounded"> {{industry}}
                            </label>
                            <label class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-white border border-surface-200 text-xs font-medium cursor-pointer hover:bg-surface-50 transition-colors">
                                <input type="checkbox" value="recent_achievement" class="accent-brand-600 rounded"> {{recent_achievement}}
                            </label>
                            <label class="flex items-center gap-1.5 px-3 py-1.5 rounded-lg bg-white border border-surface-200 text-xs font-medium cursor-pointer hover:bg-surface-50 transition-colors">
                                <input type="checkbox" value="location" class="accent-brand-600 rounded"> {{location}}
                            </label>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label for="product_description" class="block text-sm font-semibold text-black mb-2">Product / Service Description</label>
                        <textarea id="product_description" rows="3" class="form-input w-full resize-none" placeholder="e.g. AI powered customer support automation platform" required></textarea>
                    </div>
                    <div>
                        <label for="value_proposition" class="block text-sm font-semibold text-black mb-2">Value Proposition</label>
                        <textarea id="value_proposition" rows="3" class="form-input w-full resize-none" placeholder="e.g. Reduce support workload by 60% using AI agents" required></textarea>
                    </div>
                </div>
            </div>

            <!-- Email Prompt Builder Card -->
            <div class="bg-white p-8 rounded-2xl border border-surface-200 shadow-sm relative overflow-hidden">
                <div class="absolute top-0 right-0 w-64 h-64 bg-brand-100/40 rounded-full blur-3xl -translate-y-1/2 translate-x-1/2 pointer-events-none"></div>

                <div class="flex items-center gap-2 mb-6 border-b border-surface-100 pb-3 relative z-10">
                    <i data-lucide="sparkles" class="w-5 h-5 text-black"></i>
                    <h2 class="text-base font-bold text-black">AI Email Generation Prompt</h2>
                </div>
                
                <div class="mb-5 relative z-10">
                    <label for="ai_prompt" class="block text-sm font-semibold text-black mb-2">Instruction for AI</label>
                    <textarea id="ai_prompt" rows="5" class="form-input w-full resize-y font-mono text-sm leading-relaxed" required>Write a short personalized cold email.

Tone: Friendly and professional  
Goal: Book a 15 minute demo  
Audience: SaaS founders  

Use personalization with first name and company name.  
Keep the email under 120 words.  
Include a clear call-to-action asking for a quick meeting.</textarea>
                </div>

                <div class="flex items-center justify-end relative z-10">
                    <button type="submit" id="generate-btn" class="group relative px-7 py-3 rounded-xl bg-black text-white font-bold text-sm shadow-md hover:bg-surface-800 transition-colors flex items-center gap-2 overflow-hidden">
                        <span class="absolute inset-0 w-full h-full bg-gradient-to-r from-transparent via-white/10 to-transparent -translate-x-[150%] animate-[shimmer_2s_infinite]"></span>
                        <i data-lucide="cpu" class="w-4 h-4"></i> Generate Personalized Emails
                    </button>
                </div>
            </div>
        </form>

        <!-- Generation Preview -->
        <div id="preview-section" class="hidden mt-10">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-xl font-bold tracking-tight text-black">Personalized Sequences</h3>
                <div class="flex items-center gap-2 text-xs font-semibold text-surface-500 bg-surface-100 px-3 py-1.5 rounded-full">
                    <i data-lucide="info" class="w-3.5 h-3.5"></i>
                    AI generated 3 variants per lead
                </div>
            </div>

            <!-- Lead Cards Container -->
            <div id="lead-cards-container" class="space-y-8 mb-12">
                <!-- Lead Cards will be injected here -->
            </div>

            <!-- Pre-workflow Continue -->
            <div class="flex flex-col sm:flex-row justify-end items-center gap-4 border-t border-surface-200 pt-8 mt-4">
                <button type="button" id="download-csv-btn" class="w-full sm:w-auto px-6 py-3 rounded-xl border border-surface-200 bg-white hover:bg-surface-50 text-surface-700 font-semibold text-sm transition-colors flex items-center justify-center gap-2">
                    <i data-lucide="download" class="w-4 h-4"></i> Export Selection (CSV)
                </button>
                <button type="button" id="continue-workflow-btn" class="w-full sm:w-auto px-7 py-3 rounded-xl bg-brand-500 hover:bg-brand-400 text-black font-bold text-sm transition-colors shadow-sm flex items-center justify-center gap-2 group">
                    Schedule Campaign <i data-lucide="arrow-right" class="w-4 h-4 transition-transform group-hover:translate-x-1"></i>
                </button>
            </div>
        </div>
    </main>

    <!-- Refinement Backdrop/Sidebar (Hidden by default) -->
    <div id="refine-overlay" class="fixed inset-0 bg-black/20 backdrop-blur-sm z-[100] hidden transition-opacity">
        <div id="refine-sidebar" class="absolute top-0 right-0 w-full max-w-md h-full bg-white shadow-2xl p-8 transform translate-x-full transition-transform duration-300 ease-in-out">
            <div class="flex items-center justify-between mb-8">
                <h3 class="text-xl font-bold text-black">Refine Sequence</h3>
                <button id="close-refine" class="p-2 hover:bg-surface-100 rounded-full transition-colors">
                    <i data-lucide="x" class="w-5 h-5 text-black"></i>
                </button>
            </div>

            <div class="space-y-6">
                <div>
                    <label class="block text-sm font-semibold text-black mb-2">Lead</label>
                    <p id="refine-lead-info" class="text-sm text-surface-600 bg-surface-50 p-3 rounded-lg border border-surface-100 font-medium"></p>
                </div>

                <div>
                    <label class="block text-sm font-semibold text-black mb-2">What would you like to change?</label>
                    <textarea id="refine-feedback" rows="4" class="form-input w-full resize-none text-sm" placeholder="e.g. Make it more casual, mention our case study with Google, or focus more on ROI..."></textarea>
                </div>

                <div class="pt-4">
                    <button id="submit-refine" class="w-full py-3.5 rounded-xl bg-black text-white font-bold text-sm shadow-lg hover:bg-surface-800 transition-all flex items-center justify-center gap-2 group">
                        <i data-lucide="sparkles" class="w-4 h-4"></i> Apply AI Refinement
                    </button>
                </div>

                <div id="refine-loading" class="hidden flex items-center justify-center p-4">
                    <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-black"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="bg-surface-50 py-8 border-t border-surface-200 mt-20">
        <div class="max-w-7xl mx-auto px-6 flex items-center justify-between">
            <div class="flex items-center gap-2">
                <i data-lucide="zap" class="w-4 h-4 text-black fill-black"></i>
                <span class="text-sm font-bold text-black">OutreachFlow</span>
            </div>
            <p class="text-xs font-medium text-surface-500">&copy; 2026 OutreachFlow. All rights reserved.</p>
        </div>
    </footer>

    <script src="stage3.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
