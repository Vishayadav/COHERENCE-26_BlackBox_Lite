<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{subject}}</title>
</head>
<body style="margin: 0; padding: 0; background-color: {{background_color}}; font-family: 'Inter', Helvetica, Arial, sans-serif;">
    <table border="0" cellpadding="0" cellspacing="0" width="100%" style="background-color: {{background_color}};">
        <tr>
            <td align="center" style="padding: 40px 0 30px 0;">
                <table align="center" border="0" cellpadding="0" cellspacing="0" width="600" style="background-color: #ffffff; border-radius: 12px; border-collapse: separate; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.05);">
                    <!-- Header -->
                    <tr>
                        <td align="center" style="padding: 40px 0 30px 0; border-bottom: 1px solid #f3f4f6;">
                            <img src="{{logo_url}}" alt="{{company_name}} Logo" width="60" style="display: block; margin-bottom: 10px;">
                            <h1 style="margin: 0; font-size: 20px; font-weight: 700; color: #111827;">{{company_name}}</h1>
                        </td>
                    </tr>
                    <!-- Body -->
                    <tr>
                        <td style="padding: 40px 30px 40px 30px; line-height: 1.6; color: #374151; font-size: 16px;">
                            {{email_body}}
                        </td>
                    </tr>
                    <!-- Footer -->
                    <tr>
                        <td align="center" style="padding: 30px; background-color: #f9fafb; color: #9ca3af; font-size: 12px;">
                            <p style="margin: 0;">&copy; 2026 {{company_name}}. All rights reserved.</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
